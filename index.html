<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Pantheon</title>
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180" />
    <meta
      name="description"
      content="Agentic Pantheon — open tools and agents for composable AI systems."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Merriweather:ital,wght@0,400;0,600;1,400&family=Oxanium:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --card: #fcfcfc;
        --ring: #644a40;
        --input: #d8d8d8;
        --muted: #efefef;
        --accent: #e8e8e8;
        --border: #d8d8d8;
        --radius: 0.5rem;
        --chart-1: #644a40;
        --chart-2: #ffdfb5;
        --chart-3: #e8e8e8;
        --chart-4: #ffe6c4;
        --chart-5: #66493e;
        --popover: #fcfcfc;
        --primary: #644a40;
        --sidebar: #fbfbfb;
        --secondary: #ffdfb5;
        --background: #f9f9f9;
        --foreground: #202020;
        --destructive: #e54d2e;
        --sidebar-ring: #b5b5b5;
        --sidebar-accent: #f7f7f7;
        --sidebar-border: #ebebeb;
        --card-foreground: #202020;
        --sidebar-primary: #343434;
        --muted-foreground: #646464;
        --accent-foreground: #202020;
        --popover-foreground: #202020;
        --primary-foreground: #ffffff;
        --sidebar-foreground: #252525;
        --secondary-foreground: #582d1d;
        --destructive-foreground: #ffffff;
        --sidebar-accent-foreground: #343434;
        --sidebar-primary-foreground: #fbfbfb;

        --font-mono: "Fira Code", monospace;
        --font-sans: Oxanium, sans-serif;
        --font-serif: Merriweather, serif;
        --shadow-blur: 12px;
        --shadow-color: hsl(0 0% 24%);
        --shadow-spread: 0px;
        --shadow-opacity: 0.1;
        --shadow-offset-x: 0px;
        --shadow-offset-y: 3px;
      }

      .dark {
        --card: #191919;
        --ring: #ffe0c2;
        --input: #484848;
        --muted: #222222;
        --accent: #2a2a2a;
        --border: #201e18;
        --radius: 0.5rem;
        --chart-1: #ffe0c2;
        --chart-2: #393028;
        --chart-3: #2a2a2a;
        --chart-4: #42382e;
        --chart-5: #ffe0c1;
        --popover: #191919;
        --primary: #ffe0c2;
        --sidebar: #18181b;
        --secondary: #393028;
        --background: #111111;
        --foreground: #eeeeee;
        --destructive: #e54d2e;
        --sidebar-ring: #d4d4d8;
        --sidebar-accent: #27272a;
        --sidebar-border: #27272a;
        --card-foreground: #eeeeee;
        --sidebar-primary: #1d4ed8;
        --muted-foreground: #b4b4b4;
        --accent-foreground: #eeeeee;
        --popover-foreground: #eeeeee;
        --primary-foreground: #081a1b;
        --sidebar-foreground: #f4f4f5;
        --secondary-foreground: #ffe0c2;
        --destructive-foreground: #ffffff;
        --sidebar-accent-foreground: #f4f4f5;
        --sidebar-primary-foreground: #ffffff;

        --shadow-color: hsl(0 0% 0%);
        --shadow-opacity: 0.55;
      }

      @theme inline {
        --color-card: var(--card);
        --color-ring: var(--ring);
        --color-input: var(--input);
        --color-muted: var(--muted);
        --color-accent: var(--accent);
        --color-border: var(--border);
        --color-radius: var(--radius);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);
        --color-popover: var(--popover);
        --color-primary: var(--primary);
        --color-sidebar: var(--sidebar);
        --color-secondary: var(--secondary);
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-destructive: var(--destructive);
        --color-sidebar-ring: var(--sidebar-ring);
        --color-sidebar-accent: var(--sidebar-accent);
        --color-sidebar-border: var(--sidebar-border);
        --color-card-foreground: var(--card-foreground);
        --color-sidebar-primary: var(--sidebar-primary);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent-foreground: var(--accent-foreground);
        --color-popover-foreground: var(--popover-foreground);
        --color-primary-foreground: var(--primary-foreground);
        --color-sidebar-foreground: var(--sidebar-foreground);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-destructive-foreground: var(--destructive-foreground);
        --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
        --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-sans);
        background: var(--background);
        color: var(--foreground);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.5rem, 4vw, 3rem);
      }

      .card {
        width: min(100%, 26rem);
        padding: clamp(1.75rem, 4vw, 2.5rem);
        background: var(--card);
        color: var(--card-foreground);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-offset-x) var(--shadow-offset-y) var(--shadow-blur)
          var(--shadow-spread)
          color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
        text-align: center;
      }

      .logo {
        width: 8.5rem;
        height: 8.5rem;
        border-radius: var(--radius);
        object-fit: contain;
        border: 2px solid var(--ring);
        margin-inline: auto;
        display: block;
        margin-bottom: 1.25rem;
      }

      .tagline {
        margin: 0;
        font-family: var(--font-serif);
        font-size: 1.05rem;
        color: var(--muted-foreground);
      }

      .actions {
        margin-top: 1.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        justify-content: center;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.55rem 1rem;
        border-radius: var(--radius);
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        border: 1px solid transparent;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      a.button:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      a.button.primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }

      a.button.secondary {
        background: var(--secondary);
        color: var(--secondary-foreground);
        border-color: color-mix(in srgb, var(--secondary-foreground) 18%, transparent);
      }

      a.button.tertiary {
        background: var(--muted);
        color: var(--muted-foreground);
        border-color: var(--border);
      }

      .footer-note {
        margin-top: 2rem;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--muted-foreground);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        padding: 0.45rem 0.65rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--muted);
        color: var(--foreground);
        font-family: var(--font-sans);
        font-size: 0.8rem;
        cursor: pointer;
      }

      .theme-toggle:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">
      Theme
    </button>
    <main class="shell">
      <div class="card">
        <img
          class="logo"
          src="assets/agentic-p-logo-2.png"
          width="104"
          height="104"
          alt="Agentic Pantheon logo"
        />
        <h1>Agentic Pantheon</h1>
        <p class="tagline">Open-source agents for composable AI systems.</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/agentic-pantheon">GitHub</a>
          <a class="button secondary" href="https://aurey.agentic-pantheon.com">
            Aurey
          </a>
          <a class="button tertiary" href="https://fabri.agentic.pantheon.com">
            Fabri
          </a>
        </div>
      </div>
      
    </main>
    <script>
      (function () {
        var root = document.documentElement;
        var key = "agentic-pantheon-theme";
        var saved = localStorage.getItem(key);
        if (saved === "dark") root.classList.add("dark");
        else if (saved === "light") root.classList.remove("dark");
        else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
          root.classList.add("dark");

        document.getElementById("theme-toggle").addEventListener("click", function () {
          root.classList.toggle("dark");
          localStorage.setItem(key, root.classList.contains("dark") ? "dark" : "light");
        });
      })();
    </script>
  </body>
</html>
